name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# a newer commit cancels any in-flight deploy so only the latest ships
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # static site: no build step — just stage the public files
      - name: Stage site
        run: |
          mkdir dist
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='.claude' \
            --exclude='plans' --exclude='docs' \
            ./ dist/

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
